<!DOCTYPE html>
<html>
    <head>
        <meta charset="utf-8"/>
        <title>
            Html text formatting tags
        </title>
    </head>
    <body>
        <h1>
            Here is some formatted text
        </h1>
        <h2>
            text fotmatting tags
        </h2>
        <br/>
        <!--define hold text-->
        <b>
            hold text
        </b>
        <br/>
        <!--define emphasis text-->
        <em>
            emphasis text
        </em>
        <br/>
        <!--define italic text-->
        <i>
            italic text
        </i>
        <br/>
        <!--define small text-->
        <small>
            small text
        </small>
        <br/>
        <!--define strong text-->
        <strong>
            strong text
        </strong>
        <br/>
        <!--define subscript-->
        <sub>
            subscript
        </sub>
        <br/>
        <!--define superscript-->
        <sup>
            superscript
        </sup>
        <br/>
        <!--define insert text-->
        <ins>
            insert text
        </ins>
        <br/>
        <!--define  delete text-->
        <del>
            delete text
        </del>
        <br/>

        <h2>
            "computer output" tags
        </h2>
        <!--define computer code-->
        <code>
            computer code
        </code>
        <br/>
        <!--define keyboard code-->
        <kbd>
            keyboard code
        </kbd>
        <br/>
        <!--define computer code sample-->
        <samp>
            computer code sample
        </samp>
        <br/>
        <!--define variable-->
        <var>
            variable
        </var>
        <br/>
        <!--define preformatted text-->
        <pre>
            preformatted text
        </pre>
        <br/>
    </body>
</html>
