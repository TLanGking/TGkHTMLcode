<!DOCTYPE html>
<html>
    <head>
        <meta charset="utf-8">
        <title>
            Html title
        </title>
    </head>
    <body>
        <h1>
            This is the first title
        </h1>
        <!-- <br /> 换行元素 -->
        <br />
        <h2>
            This is the second title
        </h2>
        <br />
        <h3>
            This is the third title
        </h3>
        <br />
        <!-- 段落 -->
        <p>
            This is a passage
        </p>
        <!-- <hr /> 水平线元素 -->
        <hr />
        <p>
            This is another passage
        </p>
        <hr />
        <p>
            This is the last passage
        </p>
    </body>
</html>
